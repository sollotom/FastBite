<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Админ-панель доставки</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f5f7fa; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; margin-bottom: 25px; }

        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-value { font-size: 32px; font-weight: bold; color: #2c3e50; }
        .stat-label { color: #7f8c8d; margin-top: 5px; }

        .orders-table { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background: #34495e; color: white; font-weight: 500; }
        tr:hover { background: #f8f9fa; }

        .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-new { background: #fff3cd; color: #856404; }
        .status-cooking { background: #cce5ff; color: #004085; }
        .status-delivering { background: #d4edda; color: #155724; }
        .status-delivered { background: #d1e7dd; color: #0f5132; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .loading { text-align: center; padding: 40px; color: #7f8c8d; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; }

        .refresh-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-left: 15px; }
        .refresh-btn:hover { background: #2980b9; }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; align-items: center; margin-bottom: 20px;">
        <h1>🍕 Панель управления доставкой</h1>
        <button class="refresh-btn" onclick="loadAllData()">🔄 Обновить</button>
    </div>
    <p class="subtitle">React + Node.js (Firebase Cloud Functions) + Firestore</p>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="totalOrders">-</div>
            <div class="stat-label">Всего заказов</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="todayOrders">-</div>
            <div class="stat-label">Заказов сегодня</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalRevenue">-</div>
            <div class="stat-label">Выручка (всего)</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="activeOrders">-</div>
            <div class="stat-label">Активных заказов</div>
        </div>
    </div>

    <div class="orders-table">
        <h2>📋 Последние заказы</h2>
        <div id="ordersLoading" class="loading">Загрузка данных из Firebase...</div>
        <div id="ordersError" class="error" style="display: none;"></div>
        <table id="ordersTable" style="display: none;">
            <thead>
            <tr>
                <th>№ заказа</th>
                <th>Клиент</th>
                <th>Сумма</th>
                <th>Статус</th>
                <th>Дата</th>
            </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
        </table>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    // Импорт Firebase
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, orderBy, limit, getDocs, where, Timestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // ВАША КОНФИГУРАЦИЯ FIREBASE - ВСТАВЬТЕ СВОИ ДАННЫЕ ИЗ КОНСОЛИ
    const firebaseConfig = {
        apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
        authDomain: "ваш-проект.firebaseapp.com",
        projectId: "ваш-проект",
        storageBucket: "ваш-проект.appspot.com",
        messagingSenderId: "000000000000",
        appId: "1:000000000000:web:xxxxxxxxxxxx"
    };

    // Инициализация
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Функция загрузки статистики
    async function loadStats() {
        try {
            const ordersRef = collection(db, 'orders');
            const ordersSnap = await getDocs(ordersRef);

            let totalOrders = 0;
            let totalRevenue = 0;
            let activeOrders = 0;
            let todayOrders = 0;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            ordersSnap.forEach(doc => {
                const order = doc.data();
                totalOrders++;
                totalRevenue += order.totalPrice || 0;

                // Активные заказы (не доставлен и не отменен)
                const status = order.status || '';
                if (!['delivered', 'cancelled'].includes(status.toLowerCase())) {
                    activeOrders++;
                }

                // Заказы за сегодня
                if (order.createdAt) {
                    const orderDate = order.createdAt.toDate();
                    if (orderDate >= today) {
                        todayOrders++;
                    }
                }
            });

            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('todayOrders').textContent = todayOrders;
            document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString() + ' ₽';
            document.getElementById('activeOrders').textContent = activeOrders;

        } catch (error) {
            console.error('Ошибка загрузки статистики:', error);
        }
    }

    // Функция загрузки последних заказов
    async function loadRecentOrders() {
        const loadingEl = document.getElementById('ordersLoading');
        const errorEl = document.getElementById('ordersError');
        const tableEl = document.getElementById('ordersTable');
        const tbody = document.getElementById('ordersBody');

        try {
            const ordersRef = collection(db, 'orders');
            const q = query(ordersRef, orderBy('createdAt', 'desc'), limit(20));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                loadingEl.textContent = 'Заказов пока нет';
                return;
            }

            tbody.innerHTML = '';

            querySnapshot.forEach(doc => {
                const order = doc.data();
                const row = tbody.insertRow();

                // ID заказа (последние 6 символов)
                const shortId = doc.id.slice(-6).toUpperCase();

                // Имя клиента
                const customerName = order.userName || order.customerName || 'Клиент';

                // Сумма
                const total = order.totalPrice || order.total || 0;

                // Статус
                const status = order.status || 'новый';
                let statusClass = 'status-new';
                let statusText = status;

                if (status.toLowerCase().includes('готов')) statusClass = 'status-cooking';
                else if (status.toLowerCase().includes('достав')) statusClass = 'status-delivering';
                else if (status.toLowerCase().includes('заверш') || status.toLowerCase() === 'delivered') statusClass = 'status-delivered';
                else if (status.toLowerCase().includes('отмен')) statusClass = 'status-cancelled';

                // Дата
                let dateStr = '-';
                if (order.createdAt) {
                    const date = order.createdAt.toDate();
                    dateStr = date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                }

                row.innerHTML = `
                    <td><strong>#${shortId}</strong></td>
                    <td>${customerName}</td>
                    <td>${total.toLocaleString()} ₽</td>
                    <td><span class="status ${statusClass}">${statusText}</span></td>
                    <td>${dateStr}</td>
                `;
            });

            loadingEl.style.display = 'none';
            tableEl.style.display = 'table';

        } catch (error) {
            console.error('Ошибка загрузки заказов:', error);
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = 'Ошибка подключения к Firebase. Проверьте конфигурацию.';
        }
    }

    // Загрузка всех данных
    window.loadAllData = async function() {
        document.getElementById('ordersLoading').style.display = 'block';
        document.getElementById('ordersTable').style.display = 'none';
        document.getElementById('ordersError').style.display = 'none';

        await Promise.all([loadStats(), loadRecentOrders()]);
    };

    // Запуск при загрузке страницы
    loadAllData();
</script>
</body>
</html>
